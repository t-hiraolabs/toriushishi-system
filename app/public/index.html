<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>鳥生獅子連システム</title>
<link rel="icon" href="images/favicon.ico" />
<link rel="icon" type="image/png" href="images/鳥生獅子連中＿icon.png" />
<link rel="apple-touch-icon" href="images/鳥生獅子連中＿画像.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/鳥生獅子連中＿画像.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8a84b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="獅子連">

<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="header">鳥生獅子連中</div>

<div class="icon">
    <img src="images/鳥生獅子連中＿画像.png" alt="img">
</div>


<div class="login">
    <form id="loginForm">
        <div class="name">
            <label for="username">ユーザー名</label>
            <input type="text" id="username" name="username">
        </div>
        <div class="password">
            <label for="password">パスワード</label>
            <input type="password" id="password" name="password">
        </div>
        <button type="button" id="loginBtn">ログイン</button>
        <br>
        <span id="message" style="color:red;"></span>
    </form>
    <div class="forgot">
        <button type="button" id="forgotPwBtn" class="forgot-link">パスワードをお忘れの方</button>
    </div>
    <div class="regist">
        <button type="button" id="gotoRegist">メンバー申請</button>
    </div>

    <!-- パスワード再発行申請フォーム -->
    <div id="forgotForm" class="forgot-form" style="display:none;">
        <p class="forgot-desc">登録されているユーザー名（氏名）を入力して申請してください。管理者がパスワードを再設定します。</p>
        <input type="text" id="forgotUsername" placeholder="ユーザー名（例：平尾 大雅）">
        <div class="forgot-actions">
            <button type="button" id="forgotCancelBtn" class="forgot-cancel">キャンセル</button>
            <button type="button" id="forgotSubmitBtn" class="forgot-submit">申請する</button>
        </div>
        <span id="forgotMessage"></span>
    </div>

</div>

<script src="js/config.js"></script>
<script src="js/login.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
